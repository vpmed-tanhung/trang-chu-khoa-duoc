name: Cập nhật dữ liệu Cảnh báo dược

on:
  schedule:
    # 23:00, 23:15, 23:30 UTC = khoảng 06:00, 06:15, 06:30 sáng Việt Nam.
    # Lượt sau tự bỏ qua nếu lượt trước đã cập nhật thành công trong ngày.
    - cron: '0,15,30 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/pharmacovigilance_refresh_button.js'
      - 'assets/pharmacovigilance_integration.js'
      - 'assets/pharmacovigilance_auto_editor.js'
      - '.github/scripts/update_pharmacovigilance.py'
      - '.github/scripts/ensure_pharmacovigilance_refresh_button.py'
      - '.github/workflows/cap-nhat-canh-bao-duoc.yml'

permissions:
  contents: write

concurrency:
  group: cap-nhat-canh-bao-duoc
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài thư viện
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4

      - name: Gắn nút cập nhật vào trang
        run: python .github/scripts/ensure_pharmacovigilance_refresh_button.py

      - name: Lấy bản tin mới từ nguồn chính thức
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            python .github/scripts/update_pharmacovigilance.py --skip-if-fresh
          else
            python .github/scripts/update_pharmacovigilance.py
          fi

      - name: Kiểm tra tệp dữ liệu
        run: |
          python -m json.tool assets/pharmacovigilance_auto.json > /dev/null
          node --check assets/pharmacovigilance_auto_data.js
          node --check assets/pharmacovigilance_refresh_button.js
          node --check assets/pharmacovigilance_integration.js
          node --check assets/pharmacovigilance_auto_editor.js

      - name: Xác nhận 42 cảnh báo biên tập không bị thay đổi
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('assets/pharmacovigilance_alerts.json').read_text(encoding='utf-8'))
          alerts = data if isinstance(data, list) else data.get('alerts', [])
          if len(alerts) != 42:
              raise SystemExit(f'Dừng cập nhật: dữ liệu biên tập hiện có {len(alerts)} mục, không phải 42.')
          print('Đã xác nhận giữ nguyên 42 cảnh báo biên tập.')
          PY

      - name: Lưu dữ liệu mới
        run: |
          if git diff --quiet -- index.html assets/pharmacovigilance_auto.json assets/pharmacovigilance_auto_data.js; then
            echo "Không có thay đổi cần lưu."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/pharmacovigilance_auto.json assets/pharmacovigilance_auto_data.js
          git commit -m "Cập nhật bản tin Cảnh báo dược"
          git pull --rebase origin main
          git push origin main
