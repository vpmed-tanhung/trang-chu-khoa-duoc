name: Cảnh báo dược - giao diện nguyên bản và tự cập nhật

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: vpmed-pharmacovigilance-exact-file
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Lấy mã nguồn web
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cài Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements-pharmacovigilance.txt
      - name: Cài thư viện
        run: pip install -r .github/scripts/requirements-pharmacovigilance.txt
      - name: Gắn giao diện nguyên bản vào web chính
        run: python .github/scripts/ensure_pharmacovigilance_integration.py
      - name: Kiểm tra thông tin cảnh giác dược mới
        run: >-
          python .github/scripts/update_pharmacovigilance.py
          --data-path assets/pharmacovigilance_auto.json
          --curated-path assets/pharmacovigilance_alerts.json
          --pages 3
          --max-new 20
      - name: Lưu thay đổi
        shell: bash
        run: |
          if git diff --quiet -- index.html assets/pharmacovigilance_auto.json; then
            echo "Không có thay đổi mới."
            exit 0
          fi
          git config user.name "VPMED Pharmacovigilance Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/pharmacovigilance_auto.json
          git commit -m "Cập nhật cảnh báo dược trên web chính"
          git pull --rebase origin main
          git push
