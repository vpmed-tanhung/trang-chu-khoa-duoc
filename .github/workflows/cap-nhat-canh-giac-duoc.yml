name: Tích hợp và cập nhật Cảnh báo dược

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: vpmed-pharmacovigilance-main-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Lấy mã nguồn web chính
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements-pharmacovigilance.txt

      - name: Cài thư viện
        run: pip install -r .github/scripts/requirements-pharmacovigilance.txt

      - name: Gắn mục Cảnh báo dược vào index.html
        run: python .github/scripts/ensure_pharmacovigilance_integration.py index.html

      - name: Kiểm tra điểm tin Cảnh giác Dược mới
        run: >-
          python .github/scripts/update_pharmacovigilance.py
          --data-path assets/pharmacovigilance_auto.json
          --curated-path assets/pharmacovigilance_alerts.json
          --pages 3
          --max-new 20

      - name: Ghi thay đổi vào chính website hiện tại
        shell: bash
        run: |
          if git diff --quiet -- index.html assets/pharmacovigilance_auto.json; then
            echo "Không có thay đổi mới."
            exit 0
          fi
          git config user.name "VPMED Pharmacovigilance Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/pharmacovigilance_auto.json
          git commit -m "Tích hợp/cập nhật Cảnh báo dược trên web chính"
          git push
