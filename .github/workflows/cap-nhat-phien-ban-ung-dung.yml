name: Cập nhật phiên bản ứng dụng

# Mỗi khi Anh push code lên nhánh main, workflow này tự động ghi lại số
# phiên bản mới vào assets/app-version.json. Trình duyệt của bác sĩ sẽ
# tự phát hiện phiên bản mới này (xem assets/vpmed-update-notify.js) và
# tự động cập nhật vào ban đêm, hoặc hiển thị thông báo "Cập nhật ngay"
# vào ban ngày.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/app-version.json'
      - '.github/workflows/cap-nhat-phien-ban-ung-dung.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cap-nhat-phien-ban-ung-dung
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Ghi số phiên bản mới
        run: |
          export TZ=Asia/Ho_Chi_Minh
          NOW_TAG=$(date +"%Y.%m.%d.%H%M")
          NOW_ISO=$(date +"%Y-%m-%dT%H:%M:%S%:z")
          BUILD_ID=$(git rev-parse --short HEAD)
          NOTE=$(git log -1 --pretty=%s | sed 's/"/\\"/g' | cut -c1-120)
          VERSION="${NOW_TAG}-${BUILD_ID}"

          cat > assets/app-version.json <<EOF
          {
            "version": "${VERSION}",
            "updatedAt": "${NOW_ISO}",
            "note": "${NOTE}",
            "buildId": "${BUILD_ID}"
          }
          EOF

          python3 -m json.tool assets/app-version.json > /dev/null

      - name: Lưu thay đổi
        run: |
          if git diff --quiet -- assets/app-version.json; then
            echo "Không có thay đổi cần lưu."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app-version.json
          git commit -m "Cập nhật số phiên bản ứng dụng"
          git pull --rebase origin main
          git push origin main
