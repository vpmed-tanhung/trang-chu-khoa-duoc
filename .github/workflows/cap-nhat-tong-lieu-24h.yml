      - name: Gắn mô-đun vào trang tính liều
        shell: python
        run: |
          from pathlib import Path
          import re

          tag = '<script src="assets/dose_daily_summary_all.js?v=20260711-3"></script>'
          targets = [Path("index.html"), Path("dose.html")]
          found = False

          for path in targets:
              if not path.exists():
                  continue

              found = True
              text = path.read_text(encoding="utf-8")

              for marker in (
                  "assets/dose_daily_summary.js",
                  "assets/dose_daily_summary_all.js",
              ):
                  text = re.sub(
                      rf'\s*<script[^>]+src=["\'][^"\']*{re.escape(marker)}[^"\']*["\'][^>]*></script>\s*',
                      "\n",
                      text,
                      flags=re.IGNORECASE,
                  )

              match = re.search(r"</body\s*>", text, flags=re.IGNORECASE)
              if match:
                  text = text[:match.start()].rstrip() + "\n  " + tag + "\n" + text[match.start():]
              else:
                  text = text.rstrip() + "\n" + tag + "\n"

              path.write_text(text, encoding="utf-8")
              print(f"Đã cập nhật {path}")

          if not found:
              raise SystemExit("Không tìm thấy index.html hoặc dose.html")

      - name: Kiểm tra cú pháp JavaScript
        run: node --check assets/dose_daily_summary_all.js

      - name: Commit thay đổi vào nhánh main
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Không có thay đổi cần commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dose_daily_summary_all.js index.html dose.html
          git commit -m "Bổ sung tổng liều 24 giờ cho công cụ suy thận"
          git push
