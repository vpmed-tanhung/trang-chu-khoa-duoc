name: Tự động gắn Cảnh báo dược vào Ứng dụng chính

on:
  push:
    branches: [main]
    paths:
      - 'assets/pharmacovigilance_integration.js'
      - 'assets/pharmacovigilance_alerts.json'
      - '.github/scripts/ensure_pharmacovigilance_integration.py'
      - '.github/workflows/tich-hop-canh-bao-duoc.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Gắn mô-đun vào index.html
        run: python .github/scripts/ensure_pharmacovigilance_integration.py

      - name: Lưu thay đổi
        run: |
          if git diff --quiet; then
            echo "Không có thay đổi cần lưu."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Tích hợp Cảnh báo dược vào Ứng dụng chính"
          git push
