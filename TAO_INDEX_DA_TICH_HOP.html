<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tạo index.html đã tích hợp Cảnh báo dược</title>
<style>body{font-family:Arial,sans-serif;background:#eef5fa;color:#17344b;margin:0;padding:24px}.box{max-width:760px;margin:auto;background:#fff;border:1px solid #d4e3ed;border-radius:18px;padding:24px;box-shadow:0 12px 30px rgba(20,70,100,.1)}h1{color:#075f9f}.drop{border:2px dashed #79b7da;border-radius:14px;padding:28px;text-align:center;background:#f7fbfe}.btn{border:0;border-radius:10px;padding:12px 16px;background:#075f9f;color:#fff;font-weight:800;cursor:pointer;margin-top:12px}.ok{margin-top:14px;padding:12px;border-radius:10px;background:#eaf8f1;color:#106c47;display:none}.err{margin-top:14px;padding:12px;border-radius:10px;background:#fff0f0;color:#a52222;display:none}code{background:#edf3f6;padding:2px 5px;border-radius:5px}</style></head>
<body><main class="box"><h1>Tạo index.html đã tích hợp</h1><p>Chọn file <code>index.html</code> hiện tại của web. Công cụ chỉ thêm một thẻ “Cảnh báo dược về sử dụng thuốc” vào mục Ứng dụng chính và thêm một dòng giới thiệu; không sửa các ứng dụng khác.</p>
<div class="drop"><input id="file" type="file" accept=".html,text/html"><br><button class="btn" id="run">Tạo file index.html mới</button></div><div class="ok" id="ok"></div><div class="err" id="err"></div></main>
<script>
const card='<a class="feature-card pharmacovigilance-feature" href="canh-bao-duoc/index.html"><span class="feature-icon">🛡️</span><b>Cảnh báo dược về sử dụng thuốc</b><small>Tra cứu cảnh báo ADR, tương tác, thuốc nguy cơ cao, sai sót sử dụng, theo dõi xét nghiệm và biện pháp giảm thiểu nguy cơ.</small><em>Cập nhật 11/07/2026</em></a>';
const hero='<li><strong>Cảnh báo dược về sử dụng thuốc:</strong> Tra cứu cảnh báo ADR, tương tác, thuốc nguy cơ cao và biện pháp giảm thiểu nguy cơ.</li>';
const marker='<button class="feature-card" data-open="sources" data-intro-exclude="true">';
function fail(msg){err.textContent=msg;err.style.display='block';ok.style.display='none'}
run.onclick=async()=>{err.style.display='none';ok.style.display='none';const f=file.files[0];if(!f)return fail('Chưa chọn index.html.');let t=await f.text();const eol=t.includes('\r\n')?'\r\n':'\n';if(!t.includes('canh-bao-duoc/index.html')){const p=t.indexOf(marker);if(p<0)return fail('Không tìm thấy thẻ Nguồn dữ liệu hệ thống trong index.html hiện tại.');const ls=t.lastIndexOf('\n',p)+1;const indent=t.slice(ls,p);t=t.slice(0,ls)+indent+card+eol+t.slice(ls)}if(!t.includes('<strong>Cảnh báo dược về sử dụng thuốc:')){const s=t.indexOf('id="heroFeatureList"');if(s>=0){const c=t.indexOf('</ul>',s);if(c>=0){const ls=t.lastIndexOf('\n',c)+1;const indent=t.slice(ls,c);t=t.slice(0,ls)+indent+hero+eol+t.slice(ls)}}}const blob=new Blob([t],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='index.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);ok.textContent='Đã tạo index.html. Hãy upload file này cùng thư mục canh-bao-duoc lên GitHub.';ok.style.display='block'};
</script></body></html>
