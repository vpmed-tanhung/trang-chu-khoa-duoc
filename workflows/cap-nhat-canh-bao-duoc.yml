name: Cập nhật dữ liệu Cảnh báo dược

on:
  schedule:
    # 23:07 UTC = khoảng 06:07 sáng hôm sau tại Việt Nam.
    # Tránh phút 00 vì GitHub cảnh báo lịch đầu giờ có thể bị chậm hoặc bỏ hàng đợi.
    - cron: '7 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/pharmacovigilance_refresh_button.js'
      - 'assets/pharmacovigilance_refresh_config.js'
      - '.github/scripts/update_pharmacovigilance.py'
      - '.github/scripts/ensure_pharmacovigilance_refresh_button.py'
      - '.github/workflows/cap-nhat-canh-bao-duoc.yml'

permissions:
  contents: write

concurrency:
  group: cap-nhat-canh-bao-duoc
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài thư viện
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4

      - name: Gắn mô-đun cập nhật vào trang
        run: python .github/scripts/ensure_pharmacovigilance_refresh_button.py

      - name: Lấy bản tin mới từ nguồn chính thức
        run: python .github/scripts/update_pharmacovigilance.py

      - name: Kiểm tra tệp dữ liệu
        run: |
          python -m json.tool assets/pharmacovigilance_auto.json > /dev/null
          python - <<'PY'
          from pathlib import Path
          text = Path('assets/pharmacovigilance_auto_data.js').read_text(encoding='utf-8')
          if not text.startswith('window.VPMED_PHARMACOVIGILANCE_AUTO_DATA = '):
              raise SystemExit('Tệp fallback JavaScript không hợp lệ')
          PY

      - name: Lưu thời điểm kiểm tra và dữ liệu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            index.html \
            assets/pharmacovigilance_auto.json \
            assets/pharmacovigilance_auto_data.js

          if git diff --cached --quiet; then
            echo "Không có thay đổi cần lưu."
            exit 0
          fi

          git commit -m "Cập nhật bản tin Cảnh báo dược"
          git pull --rebase origin main
          git push origin HEAD:main
