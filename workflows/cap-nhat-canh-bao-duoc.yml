name: Cập nhật dữ liệu Cảnh báo dược

on:
  schedule:
    # 23:00 UTC = 06:00 sáng hôm sau tại Việt Nam
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/pharmacovigilance_refresh_button.js'
      - '.github/scripts/update_pharmacovigilance.py'
      - '.github/scripts/ensure_pharmacovigilance_refresh_button.py'
      - '.github/workflows/cap-nhat-canh-bao-duoc.yml'

permissions:
  contents: write

concurrency:
  group: cap-nhat-canh-bao-duoc
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài thư viện
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4

      - name: Gắn nút cập nhật vào trang
        run: python .github/scripts/ensure_pharmacovigilance_refresh_button.py

      - name: Lấy bản tin mới từ nguồn chính thức
        run: python .github/scripts/update_pharmacovigilance.py

      - name: Kiểm tra JSON
        run: python -m json.tool assets/pharmacovigilance_auto.json > /dev/null

      - name: Lưu dữ liệu mới
        run: |
          if git diff --quiet -- index.html assets/pharmacovigilance_auto.json; then
            echo "Không có thay đổi cần lưu."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/pharmacovigilance_auto.json
          git commit -m "Cập nhật bản tin Cảnh báo dược"
          git push
